<div class="flex items-center justify-between gap-1 border-[.1em] border-outline-normal rounded-md px-2 py-1 focus-within:border-primary focus-within:ring-2 ring-primary/15 dark:border-neutral-700">
  <input 
    class="w-full text-[1rem] text-text-bold dark:text-white placeholder:text-text-dim" 
    [id]="id()" 
    [type]="type()" 
    [placeholder]="placeholder()"
    [value]="value"
    (change)="setValue($event)"
  >
  @if (controlType() === 'password') {
    <fa-icon 
      class="text-[.8rem] text-text-dim cursor-pointer" 
      [icon]="type() === 'password'? 'eye' : 'eye-slash'" 
      (click)="showPassword()"
    /> 
  }
</div>
