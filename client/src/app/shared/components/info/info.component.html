<div class="flex flex-col gap-2">
  <div class="flex flex-col">
    <span class="text-xs uppercase text-primary">Certificate ID</span>
    <span class="text-base flex items-center justify-between gap-2">
      <span class="break-all break-words">{{ certificate()!.uuid }}</span>
      <fa-icon class="text-sm text-text-mid cursor-pointer" [icon]="'copy'" (click)="copy()"/>
    </span>
  </div>

  <div class="flex flex-col">
    <span class="text-xs uppercase text-primary">Memo</span>
    <span class="text-base">{{ certificate().memo }}</span>
  </div>

  <div class="flex flex-col">
    <span class="text-xs uppercase text-primary">USER</span>
    <span class="text-base">{{ certificate().user }}</span>
  </div>

  <div class="flex flex-col">
    <span class="text-xs uppercase text-primary">Issued By</span>
    <span class="text-base">{{ certificate().issuer }}</span>
  </div>

  <div class="flex flex-col">
    <span class="text-xs uppercase text-primary">Issued At</span>
    <span class="text-base">{{ getTimestamp(certificate().timestamp)}}</span>
  </div>
</div>
