<main class="w-screen flex items-center justify-center ">
  <div class="w-[min(100%,1000px)] flex flex-col items-center justify-center gap-4 p-4 text-text-bold dark:text-white">
    <span class="block w-full text-3xl font-semibold text-text-bold mb-4 dark:text-white">Issued Certificated</span>

    <ul class="w-full flex flex-col gap-4">
      @for (certificate of certificates(); track certificate.uuid) {
        <li>
          <app-card [certificate]="certificate" [type]="'USER'"/>
        </li>
      } @empty {
        <li class="rounded-lg flex flex-col p-4 border-[.1em] border-outline-normal text-text-mid dark:border-neutral-700">
          <span>No certificates has been issued.</span>
        </li>
      }
    </ul>
  </div>
</main>
