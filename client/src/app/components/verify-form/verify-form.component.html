<div class="fixed top-0 left-0 w-screen h-screen flex items-center justify-center bg-[#f5f5f557] text-text-bold p-4 z-50">
  <div class="bg-background w-[min(100%,400px)] rounded-lg shadow-sm p-4">
    <div class="flex items-center justify-between gap-1 mb-4">
      <span class="text-xl font-semibold block">Verify Certificate</span>
      <fa-icon class="text-sm cursor-pointer" [icon]="'close'" (click)="cancel()"/>
    </div>

    <form class="w-full flex flex-col gap-4" [formGroup]="form" (ngSubmit)="verifyCertificate()">
      <div>
        <label class="text-sm" for="id">Cerificate ID</label>
        <app-input [id]="'id'" [placeholder]="'eg34-4344-4344'" formControlName="key"/>
        @if (formError() && formControl['key'].errors) {
          <span class="text-sm text-error">*Required certificate id</span>
        }
      </div>

      @if(!key()) {
        <button class="bg-primary border-primary text-white">Verify</button>
      }
    </form>

    @if(key()) {
      <div class="flex flex-col gap-4 mt-4">
        <span class="flex items-center justify-center gap-1" [class]="{'text-green-600': verified(), 'text-error': !verified()}">
          <fa-icon class="text-xl" [icon]="verified()? 'circle-check' : 'circle-xmark'"/>
          <span class="text-xl font-semibold">{{ verified()? 'Verified' : 'Invalid' }}</span>
        </span>
      </div>    
    }
  </div>
</div>
